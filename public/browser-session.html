<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Browser Session</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #07080b;
        overflow: hidden;
      }

      #frame {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #07080b;
      }
    </style>
  </head>
  <body>
    <iframe
      id="frame"
      sandbox="allow-scripts allow-forms allow-popups allow-same-origin allow-downloads"
      referrerpolicy="no-referrer"
    ></iframe>

    <script>
      window.addEventListener("DOMContentLoaded", function () {
        const frame = document.getElementById("frame");
        let currentUrl = "https://example.com/";

        function post(type, extra) {
          parent.postMessage({ type, ...(extra || {}) }, "*");
        }

        function navigate(url) {
          if (!frame || !url) return;
          currentUrl = url;
          post("browser:loading");
          frame.src = url;
          post("browser:url-changed", { url });
        }

        window.addEventListener("message", function (e) {
          const data = e.data || {};

          if (data.type === "browser:navigate" && data.url) {
            navigate(data.url);
          }

          if (data.type === "browser:reload") {
            if (frame) frame.src = currentUrl || "https://duckduckgo.com/";
          }

          if (data.type === "browser:back") {
            try {
              frame.contentWindow.history.back();
            } catch {}
          }

          if (data.type === "browser:forward") {
            try {
              frame.contentWindow.history.forward();
            } catch {}
          }
        });

        frame.addEventListener("load", function () {
          post("browser:connected");
          try {
            const url = frame.contentWindow.location.href;
            if (url && url !== "about:blank") {
              currentUrl = url;
            }
          } catch {}
          post("browser:url-changed", { url: currentUrl });
        });

        navigate(currentUrl);
      });
    </script>
  </body>
</html>
