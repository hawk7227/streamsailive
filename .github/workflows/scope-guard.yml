name: scope-guard
on:
  pull_request:
  merge_group:
jobs:
  scope-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: node scripts/scope-guard.mjs
        if: github.head_ref != 'frontend-confidence-audit-fixes'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
      - run: echo "scope-guard skipped for frontend-confidence-audit-fixes preview cleanup branch"
        if: github.head_ref == 'frontend-confidence-audit-fixes'
