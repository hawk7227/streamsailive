name: Streams AI Final Diagnostic

on:
  pull_request:
    branches: [main]

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: TypeScript
        run: |
          set -o pipefail
          npx tsc --noEmit 2>&1 | tee final-tsc.log
      - name: Production tests
        run: |
          set -o pipefail
          pnpm test:streams-ai-production 2>&1 | tee final-tests.log
      - name: Next build
        env:
          OPENAI_API_KEY: test-placeholder
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-placeholder
          FAL_API_KEY: test-placeholder
          ADMIN_SECRET_KEY: test-placeholder
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee final-build.log
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: streams-ai-final-diagnostic
          path: |
            final-tsc.log
            final-tests.log
            final-build.log
          if-no-files-found: warn
