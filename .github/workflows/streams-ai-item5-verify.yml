name: Streams AI Item 5 Verify

on:
  pull_request:
    branches: [main]

jobs:
  verify-item5:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Production contract tests
        run: pnpm test:streams-ai-production
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Next production build
        env:
          OPENAI_API_KEY: test-placeholder
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-placeholder
          FAL_API_KEY: test-placeholder
          ADMIN_SECRET_KEY: test-placeholder
        run: pnpm build
