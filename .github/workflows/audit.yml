name: Streams Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: BUILD_RULES + FRONTEND_BUILD_RULES
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Streams audit
        run: python scripts/audit.py

      - name: Upload violation report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: audit-violations
          path: audit-report.txt
          retention-days: 7
