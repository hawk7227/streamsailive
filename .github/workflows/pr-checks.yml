name: pr-checks
on:
  pull_request:
  merge_group:
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/scope-guard.mjs
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
      - run: node scripts/generated-file-guard.mjs
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
      - run: git diff --check
      - run: npx tsc --noEmit
      - run: pnpm build
      - run: git restore public/build-report.json || true
      - run: python scripts/audit.py || py scripts/audit.py || python3 scripts/audit.py
