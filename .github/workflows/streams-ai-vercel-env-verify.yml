name: Streams AI Vercel Environment Verify

on:
  pull_request:
    branches: [main]

jobs:
  vercel-environment-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      VERCEL: "1"
      CI: "1"
      NODE_ENV: production
      OPENAI_API_KEY: test-placeholder
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-placeholder
      FAL_API_KEY: test-placeholder
      ADMIN_SECRET_KEY: test-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Vercel-equivalent build
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee streams-ai-vercel-env-build.log
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: streams-ai-vercel-env-build
          path: streams-ai-vercel-env-build.log
          if-no-files-found: error
