    function ContextWarning({ tokens, onCompress, onNewChat }) {
      const percentage = Math.min((tokens / CONTEXT_LIMITS.max) * 100, 100);
      const isDanger = tokens >= CONTEXT_LIMITS.danger;
      const isWarning = tokens >= CONTEXT_LIMITS.warning;
      const isCritical = tokens >= CONTEXT_LIMITS.max * 0.95;

      return (
        <div className={`mx-4 mb-3 p-3 rounded-xl ${isDanger ? 'context-danger' : 'context-warning'}`}>

            <div className="flex-1 min-w-0">
              <div className="flex items-center justify-between mb-2">
                <h4 className={`text-sm font-medium ${isDanger ? 'text-red-300' : 'text-amber-300'}`}>
                  {isCritical ? 'Context Limit Reached' : isDanger ? 'Running Low on Context' : 'Context Usage High'}

                <span className="text-xs text-zinc-400">{Math.round(percentage)}% used</span>

              {/* Progress bar */}

    // ============================================
    // HOOK: useFileUpload - Handles file uploads
    // ============================================

    function useFileUpload() {
      const [files, setFiles] = useState([]);
      const [dragActive, setDragActive] = useState(false);

      const addFiles = async (fileList) => {
        const newFiles = Array.from(fileList).slice(0, FILE_CONFIG.maxFiles - files.length);
        
        for (const file of newFiles) {
          if (file.size > FILE_CONFIG.maxSize) continue;
          
          const info = getFileInfo(file.type, file.name);
          const fileObj = {
            id: Date.now() + Math.random(),
            name: file.name,
            size: file.size,
            type: file.type,
            icon: info.icon,
            cat: info.cat,
            status: 'reading',
            preview: null,
            text: null,
            raw: file
          };
          
          setFiles(p => [...p, fileObj]);

          const reader = new FileReader();
          reader.onload = (e) => {
            setFiles(p => p.map(f => f.id === fileObj.id ? {
              ...f,
              status: 'ready',
              preview: info.cat === 'image' ? e.target.result : null,
              text: ['text', 'code', 'data'].includes(info.cat) ? e.target.result : null
            } : f));
          };
          
          if (info.cat === 'image') reader.readAsDataURL(file);
          else reader.readAsText(file);
        }
      };

      const removeFile = (id) => setFiles(p => p.filter(f => f.id !== id));
      const clearFiles = () => setFiles([]);

      const handleDrag = (e) => {
        e.preventDefault();
        if (e.type === 'dragenter' || e.type === 'dragover') setDragActive(true);
        else if (e.type === 'dragleave') setDragActive(false);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setDragActive(false);
        if (e.dataTransfer.files?.length) addFiles(e.dataTransfer.files);
      };

      return { files, dragActive, addFiles, removeFile, clearFiles, handleDrag, handleDrop };
    }

    // ============================================
    // HOOK: useCompaction - Manages conversation compaction
    // ============================================

    function useCompaction() {
      const [isCompacting, setIsCompacting] = useState(false);
      const [compactProgress, setCompactProgress] = useState(0);
      const [compactStage, setCompactStage] = useState('analyzing');

      const runCompaction = useCallback(async (messages, strategy, onComplete) => {
        setIsCompacting(true);
        setCompactProgress(0);
        setCompactStage('analyzing');

        // Simulate compaction stages
        const stages = ['analyzing', 'summarizing', 'compressing', 'rebuilding', 'complete'];
        const stageProgress = [0, 25, 50, 75, 100];

        for (let i = 0; i < stages.length; i++) {
          setCompactStage(stages[i]);
          
          // Animate progress within each stage
          const startProgress = stageProgress[i];
          const endProgress = stageProgress[i + 1] || 100;
          const duration = stages[i] === 'complete' ? 500 : 800 + Math.random() * 400;
          const steps = 20;
          const stepDuration = duration / steps;

          for (let step = 0; step <= steps; step++) {
            await new Promise(r => setTimeout(r, stepDuration));
            const progress = startProgress + ((endProgress - startProgress) * (step / steps));
            setCompactProgress(progress);
          }
        }

        // Wait a moment on complete
        await new Promise(r => setTimeout(r, 800));

        // Generate compacted result
        let compactedMessages = [];
        
        switch (strategy) {
          case 'summarize':
            // Keep last few messages + add summary
            const recentMessages = messages.slice(-4);
            compactedMessages = [
              {
                role: 'system',
                content: `[Previous conversation summary: The user and assistant discussed various topics. Key points have been preserved. ${messages.length - 4} messages were summarized to save context.]`,
                isCompactionSummary: true
              },
              ...recentMessages
            ];
            break;

          case 'removeCode':
            // Remove code blocks but keep text
            compactedMessages = messages.map(m => ({
              ...m,
              content: m.content.replace(/```[\s\S]*?```/g, '[Code block removed to save context]')
            }));
            break;

          case 'keepRecent':
            // Keep only last 6 messages
            compactedMessages = messages.slice(-6);
            break;

          case 'archive':
            // Archive all and start fresh with summary
            compactedMessages = [{
              role: 'system',
              content: `[Conversation archived. ${messages.length} messages saved to memory. Starting fresh with preserved context.]`,
              isCompactionSummary: true
            }];
            break;

          default:
            compactedMessages = messages.slice(-6);
        }

        setIsCompacting(false);
        setCompactProgress(0);
        setCompactStage('analyzing');
        
        if (onComplete) {
          onComplete(compactedMessages);
        }

        return compactedMessages;
      }, []);

      return {
        isCompacting,
        compactProgress,
        compactStage,
        runCompaction
      };
    }

        await runCompaction(messages, 'summarize', (compactedMessages) => {

              {msg.role === 'assistant' ? (
                <div className="prose max-w-none">
                  <div dangerouslySetInnerHTML={{ __html: marked.parse(msg.content) }} />
                  {isGenerating && idx === messages.length - 1 && <span className="inline-block w-2 h-5 bg-emerald-500 typing-cursor" />}
                </div>
              ) : (
                <p className="text-sm whitespace-pre-wrap text-zinc-100">{msg.content}</p>
              )}
            </div>
            {msg.role === 'user' && <Avatar name="M" size="sm" />}
          </div>
        );
      };

      return (
        <div className="flex h-full" onDragEnter={handleDrag} onDragLeave={handleDrag} onDragOver={handleDrag} onDrop={handleDrop}>
          {/* Compacting Overlay */}
          <CompactingOverlay 
            isVisible={isCompacting} 
            progress={compactProgress} 
            stage={compactStage} 
          />

          {/* Chat Area */}
          <div className="flex-1 flex flex-col min-w-0 relative">
            {/* Drag Overlay */}
            {dragActive && (
              <div className="absolute inset-0 bg-zinc-950/90 flex items-center justify-center z-20 border-2 border-dashed border-emerald-500 m-2 rounded-xl">
                <div className="text-center">
                  <div className="w-16 h-16 mx-auto mb-4 text-emerald-400">{Icons.upload}</div>
                  <p className="text-lg font-medium">Drop files here</p>
                  <p className="text-sm text-zinc-500">Images, documents, code files up to 100MB</p>
                </div>
              </div>
            )}

            {/* Context Warning */}
            <ContextWarning 
              tokens={contextTokens} 
              onCompress={() => setShowCompressionModal(true)} 
              onNewChat={handleNewChat}
            />

            {/* Messages */}
            <div className="flex-1 overflow-y-auto scrollbar-thin">
              {messages.length === 0 ? (
                <div className="flex flex-col items-center justify-center h-full text-center px-4">
                  <div className="w-16 h-16 mb-6 text-zinc-700">{Icons.sparkles}</div>
                  <h1 className="text-2xl font-semibold text-zinc-100 mb-2">How can I help you today?</h1>
                  <p className="text-zinc-500 max-w-md mb-8">Ask me to build UI components, write code, explain concepts, or help with any development task.</p>
                  <div className="grid grid-cols-2 gap-3 max-w-lg">
                    {['Build a counter component', 'Create a login form', 'Design a dashboard', 'Write an API endpoint'].map(s => (
                      <button key={s} onClick={() => setInput(s)} className="p-3 text-sm text-left bg-zinc-900 border border-zinc-800 rounded-xl hover:border-zinc-700 transition-colors">
                        {s}
                      </button>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="max-w-3xl mx-auto py-6 px-4 space-y-6">
                  {messages.map((msg, idx) => renderMessage(msg, idx))}
                  <div ref={messagesEndRef} />
                </div>
              )}
            </div>

            {/* Attached Files Preview */}
            {attachedFiles.length > 0 && (
              <div className="px-4 py-2 border-t border-zinc-800 bg-zinc-900/30">
                <div className="max-w-3xl mx-auto flex flex-wrap gap-2">
                  {attachedFiles.map(f => (
                    <div key={f.id} className="flex items-center gap-2 px-2.5 py-1.5 bg-zinc-800 border border-zinc-700 rounded-lg text-sm">
                      {f.preview ? <img src={f.preview} className="w-6 h-6 rounded object-cover" alt="" /> : <span>{f.icon}</span>}
                      <span className="max-w-[120px] truncate text-zinc-300">{f.name}</span>
                      {f.status === 'reading' && <div className="w-3 h-3 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin" />}
                      <button onClick={() => removeAttachedFile(f.id)} className="text-zinc-500 hover:text-red-400">{Icons.close}</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Input */}
            <div className="border-t border-zinc-800 bg-zinc-900/50 p-4">
              <div className="max-w-3xl mx-auto">
                <input type="file" ref={fileInputRef} multiple onChange={e => { addFiles(e.target.files); e.target.value = ''; }} className="hidden" />
                <div className="relative bg-zinc-900 border border-zinc-700 rounded-2xl overflow-hidden focus-within:ring-2 focus-within:ring-emerald-500/50 focus-within:border-emerald-500">
                  <div className="flex items-end">
                    <button onClick={() => fileInputRef.current?.click()} className="flex-shrink-0 p-3 text-zinc-500 hover:text-zinc-300 transition-colors" title="Attach files">
                      {Icons.paperclip}
                    </button>
                    <textarea
                      ref={inputRef}
                      value={input}
                      onChange={(e) => setInput(e.target.value)}
                      onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmit(); } }}
                      placeholder="Message StreamsAI... (drop files here)"
                      rows={1}
                      className="flex-1 px-2 py-3 bg-transparent text-zinc-100 placeholder:text-zinc-500 resize-none focus:outline-none text-sm"
                    />
                    <div className="flex-shrink-0 flex items-center gap-2 p-2">
                      {contextTokens > 0 && (
                        <span className={`text-xs ${
                          contextTokens >= CONTEXT_LIMITS.danger ? 'text-red-400' :
                          contextTokens >= CONTEXT_LIMITS.warning ? 'text-amber-400' : 'text-zinc-600'
                        }`}>
                          {(contextTokens/1000).toFixed(1)}K
                        </span>
                      )}
                      {attachedFiles.length > 0 && (
                        <span className="text-xs text-emerald-400 bg-emerald-500/20 px-1.5 py-0.5 rounded">
                          {attachedFiles.length} file{attachedFiles.length !== 1 ? 's' : ''}
                        </span>
                      )}
                      {isGenerating ? (
                        <Button variant="ghost" size="icon-sm" onClick={() => setIsGenerating(false)}>{Icons.stop}</Button>
                      ) : (
                        <Button variant="primary" size="icon-sm" onClick={handleSubmit} disabled={!input.trim() && attachedFiles.length === 0}>{Icons.send}</Button>
                      )}
                    </div>
                  </div>
                </div>
                <div className="flex items-center justify-center gap-4 mt-2">
                  <p className="text-xs text-zinc-600">StreamsAI can make mistakes. Check important info.</p>
                  {contextTokens >= CONTEXT_LIMITS.warning && (
                    <button 
                      onClick={() => setShowCompressionModal(true)}
                      className="text-xs text-amber-500 hover:text-amber-400 flex items-center gap-1"
                    >
                      {Icons.compress}
                      Compact conversation
                    </button>
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* Preview Panel */}
          {previewOpen && (
            <div className="w-[500px] flex-shrink-0">
              <PreviewPanel isVisible={previewOpen} />
            </div>
          )}

          {/* Compression Modal */}
          <CompressionModal 
            isOpen={showCompressionModal} 
            onClose={() => setShowCompressionModal(false)} 
            onApply={handleCompress}
            currentTokens={contextTokens}
          />
        </div>
      );
    }

    // ============================================
    // COMPONENT: Settings Page
    // ============================================

    function SettingsPage() {
      const { setCurrentPage, user } = useApp();
      const [activeTab, setActiveTab] = useState('general');
      
      const tabs = [
        { id: 'general', label: 'General', icon: Icons.settings },
        { id: 'account', label: 'Account', icon: Icons.database },
        { id: 'billing', label: 'Billing', icon: Icons.zap },
        { id: 'usage', label: 'Usage', icon: Icons.database },
      ];

      return (
        <div className="flex h-full">
          <div className="w-52 border-r border-zinc-800 p-4">
            <h2 className="text-xl font-semibold mb-6">Settings</h2>
            <nav className="space-y-1">
              {tabs.map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors ${activeTab === tab.id ? 'bg-zinc-800 text-zinc-100' : 'text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/50'}`}
                >
                  <span className="text-zinc-500">{tab.icon}</span>
                  {tab.label}
                </button>
              ))}
            </nav>
          </div>
          <div className="flex-1 p-8 overflow-y-auto">
            <div className="max-w-2xl">
              {activeTab === 'general' && (
                <div className="space-y-6">
                  <h3 className="text-lg font-semibold">Profile</h3>
                  <div className="flex items-center gap-4">
                    <Avatar name={user.name} size="lg" />
                    <div>
                      <input type="text" defaultValue={user.name} className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-zinc-100" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-zinc-400 mb-2">Email</label>
                    <input type="email" defaultValue={user.email} className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-zinc-100" />
                  </div>
                </div>
              )}
              {activeTab === 'billing' && (
                <div className="space-y-6">
                  <h3 className="text-lg font-semibold">Billing</h3>
                  <div className="p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl">
                    <p className="font-medium text-emerald-400">Max Plan - $100/month</p>
                    <p className="text-sm text-zinc-400 mt-1">20x more usage, priority access</p>
                  </div>
                  <Button variant="outline" onClick={() => setCurrentPage('upgrade')}>Manage subscription</Button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ============================================
    // COMPONENT: Upgrade Page
    // ============================================

    function UpgradePage() {
      const { setCurrentPage } = useApp();
      
      return (
        <div className="max-w-5xl mx-auto py-12 px-4">
          <button onClick={() => setCurrentPage('settings')} className="flex items-center gap-2 text-sm text-zinc-500 hover:text-zinc-300 mb-8">
            ← Back to Settings
          </button>
          <h1 className="text-3xl font-bold text-center mb-10">Choose your plan</h1>
          <div className="grid md:grid-cols-2 gap-6">
            {[
              { name: 'Pro', price: 17, period: 'month', features: ['More usage than Free', 'Access more models', 'Unlimited Projects', 'Deep Research tools'] },
              { name: 'Max', price: 100, period: 'month', highlight: true, features: ['Everything in Pro', '5x-20x more usage', 'Higher output limits', 'Priority access', 'Early access to features'] }
            ].map(plan => (
              <div key={plan.name} className={`p-6 rounded-2xl border ${plan.highlight ? 'border-emerald-500/50 bg-emerald-500/5' : 'border-zinc-800'}`}>
                <h3 className="text-xl font-semibold">{plan.name}</h3>
                <p className="text-3xl font-bold mt-4">${plan.price}<span className="text-lg text-zinc-500">/{plan.period}</span></p>
                <Button variant={plan.highlight ? 'primary' : 'outline'} className="w-full mt-6">{plan.highlight ? 'Current Plan' : 'Downgrade'}</Button>
                <ul className="mt-6 space-y-2">
                  {plan.features.map(f => <li key={f} className="flex items-center gap-2 text-sm text-zinc-400"><span className="text-emerald-500">{Icons.check}</span>{f}</li>)}
                </ul>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ============================================
    // MAIN APP
    // ============================================

    function App() {
      const { currentPage, sidebarCollapsed, setSidebarCollapsed, previewOpen, setPreviewOpen } = useApp();

      const renderPage = () => {
        switch (currentPage) {
          case 'settings': return <SettingsPage />;
          case 'upgrade': return <UpgradePage />;
          default: return <ChatPage />;
        }
      };

      return (
        <div className="flex h-screen bg-zinc-950">
          <Sidebar isCollapsed={sidebarCollapsed} />
          
          <div className="flex-1 flex flex-col min-w-0">
            {/* Header */}
            <header className="flex items-center justify-between px-4 py-2 border-b border-zinc-800 bg-zinc-900/50">
              <div className="flex items-center gap-2">
                <Button variant="ghost" size="icon-sm" onClick={() => setSidebarCollapsed(!sidebarCollapsed)}>
                  {Icons.panelLeft}
                </Button>
                <h1 className="text-sm font-semibold">StreamsAI Copilot</h1>
              </div>
              <div className="flex items-center gap-2">
                {currentPage === 'chat' && (
                  <Button variant="ghost" size="icon-sm" onClick={() => setPreviewOpen(!previewOpen)} className={previewOpen ? 'text-emerald-400' : ''}>
                    {Icons.panelRight}
                  </Button>
                )}
              </div>
            </header>

            {/* Content */}
            <div className="flex-1 overflow-hidden">
              {renderPage()}
            </div>
          </div>
        </div>
      );
    }

    // ============================================
    // RENDER
    // ============================================

    function Root() {
      return (
        <AppProvider>
          <ToastProvider>
            <App />
          </ToastProvider>
        </AppProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
